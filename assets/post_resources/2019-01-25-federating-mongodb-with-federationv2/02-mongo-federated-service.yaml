apiVersion: v1
kind: List
items:
- apiVersion: primitives.federation.k8s.io/v1alpha1
  kind: FederatedService
  metadata:
    name: mongo
    namespace: federated-mongo
    labels:
      name: mongo
  spec:
    template:
      metadata:
        labels:
          name: mongo
      spec:
        type: ClusterIP
        ports:
          - port: 27017
            targetPort: 27017
            protocol: TCP
        selector:
          name: mongo
- apiVersion: primitives.federation.k8s.io/v1alpha1
  kind: FederatedServicePlacement
  metadata:
    name: mongo
    namespace: federated-mongo
  spec:
    clusterNames:
    - cluster1
    - cluster2
    - cluster3
